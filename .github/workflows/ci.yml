# Continuous integration: build, test, clippy (-D warnings), rustfmt --check,
# and doc-link integrity, on stable across the workspace.
name: ci

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: build · test · lint · format · doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: thumbv7em-none-eabi

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Formatting (cargo fmt --check)
        run: cargo fmt --all --check

      - name: Build (cargo build)
        run: cargo build --workspace --all-targets

      - name: Tests (cargo test)
        run: cargo test --workspace

      - name: Lint (clippy -D warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Doc links (deny broken intra-doc links)
        run: cargo doc --no-deps --workspace

      - name: no_std build (core crate on a bare-metal target)
        run: cargo build -p ix-schema --target thumbv7em-none-eabi
